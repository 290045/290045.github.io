<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>290045's Hub</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #000000;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #303030;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    /* Tab Layouts - Hide them by default */
    .tab-content {
      display: none;
    }

    /* Show the active tab */
    .tab-content.active {
      display: block;
    }

    /* Grid layout for buttons */
    .grid-layout {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    /* Big Menu Buttons for Homepage */
    .menu-layout {
      display: flex;
      flex-direction: column;
      gap: 20px;
      max-width: 400px;
      margin: 0 auto;
    }

    button {
      background: #f7f5f5;
      border: none;
      padding: 14px;
      border-radius: 10px;
      color: black;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #dbd7d7;
      transform: scale(1.03);
    }

    /* Back Button Style */
    .back-btn {
      background: #ef4444;
      color: white;
      margin-bottom: 20px;
      width: 100%;
    }
    .back-btn:hover {
      background: #dc2626;
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }

    .suggest-wrapper {
      display: flex;
      justify-content: center;
      margin-top: 20px;
    }
    
    .credits-text {
      text-align: center;
      line-height: 1.6;
      font-size: 18px;
    }
  </style>
</head>
  
<body>

  <div class="container">

    <!-- ================= HOMEPAGE TAB ================= -->
    <div id="homepage" class="tab-content active">
      <h1>Welcome to 290045's Hub</h1>
      <div class="menu-layout">
        <button onclick="switchTab('games')">🎮 Games</button>
        <button onclick="switchTab('proxies')">🌐 Proxies</button>
        <button onclick="switchTab('credits')">📝 Credits</button>
      </div>
    </div>

    <!-- ================= GAMES TAB ================= -->
    <div id="games" class="tab-content">
      <button class="back-btn" onclick="switchTab('homepage')">⬅ Back to Home</button>
      <h1>Games</h1>
      <div class="grid-layout">
        <button onclick="handleLinkClick('https://myinstants.com')">Sound Board</button>
        <button onclick="handleLinkClick('https://rocketgoal.io')">Rocket League</button>
        <button onclick="handleLinkClick('https://neocities.org')">Blooket Bot</button>
        <button onclick="handleLinkClick('https://kahootbot.net')">Kahoot Bot</button>
        <button onclick="handleLinkClick('https://gimkitbot.com')">Gimkit Bot</button>
      </div>
    </div>

    <!-- ================= PROXIES TAB ================= -->
    <div id="proxies" class="tab-content">
      <button class="back-btn" onclick="switchTab('homepage')">⬅ Back to Home</button>
      <h1>Proxies & Tools</h1>
      <div class="grid-layout">
        <button onclick="handleLinkClick('https://github.io')">Seraph</button>
        <button onclick="handleLinkClick('https://noahstutoring.academy')">Noah's Hub</button>
        <button onclick="handleLinkClick('https://pages.dev')">Selenite</button>
        <button onclick="handleLinkClick('https://neocities.org')">Pluto TV</button>
        <button onclick="handleLinkClick('https://ipv64.net')">Interstellar</button>
        <button onclick="handleLinkClick('https://cloudflare.net')">Space</button>
        <button onclick="handleLinkClick('https://granit-union.ru')">Galaxy v6 Proxy</button>
        <button onclick="handleLinkClick('https://sulevkivastik.ee')">Void v5</button>
        <button onclick="handleLinkClick('https://jsdelivr.net')">GUST</button>
        <button onclick="handleLinkClick('https://goodfox.com.br')">LuminalOS</button>
        <button onclick="handleLinkClick('https://schooloqy.com')">RammerHead</button>
        <button onclick="handleLinkClick('https://remiosenifoundation.org')">Utopia</button>
        <button onclick="handleLinkClick('https://google.com')">Movies</button>
        <button onclick="handleLinkClick('https://soap2day.day')">More Movies</button>
        <button onclick="handleLinkClick('https://pages.dev')">Diamond</button>
        <button onclick="handleLinkClick('https://github.io')">Seraph (Alt)</button>
        <button onclick="handleLinkClick('https://github.io')">Selenite (Alt)</button>
      </div>
      
    <!-- ================= CREDITS TAB ================= -->
    <div id="credits" class="tab-content">
      <button class="back-btn" onclick="switchTab('homepage')">⬅ Back to Home</button>
      <h1>Credits</h1>
      <div class="credits-text">
        <p><strong>Owner:</strong> 290045</p>
        <p><strong>Credits:</strong> Shout out to the proxy/game sites used and to my friend and AI to help code the site!</p>
        <p>Thanks for visiting the site!</p>
      </div>
    </div>

    <!-- ================= FOOTER ================= -->
    <div class="footer">
      Updated <span id="update-date">Loading...</span>
    </div>

  </div>

  <script>
    const GITHUB_USERNAME = '290045'; 
    const GITHUB_REPO = '290045.github.io'; 

    // Tab switcher logic function
    function switchTab(tabId) {
      // Hide all tabs
      const tabs = document.querySelectorAll('.tab-content');
      tabs.forEach(tab => tab.classList.remove('active'));
      
      // Show chosen tab
      document.getElementById(tabId).classList.add('active');
    }

    // Automatically fetch the last commit date from GitHub API on page load
    window.addEventListener('DOMContentLoaded', () => {
      const dateElement = document.getElementById('update-date');
      if (!dateElement) return;

      const url = `https://github.com{GITHUB_USERNAME}/${GITHUB_REPO}/commits?per_page=1`;

      fetch(url)
        .then(response => {
          if (!response.ok) throw new Error('API failed');
          return response.json();
        })
        .then(data => {
          if (data && data.length > 0) {
            const commitDateString = data.commit.committer.date;
            const commitDate = new Date(commitDateString);
            const options = { month: 'short', day: 'numeric', year: 'numeric' };
            dateElement.textContent = commitDate.toLocaleDateString('en-US', options);
          } else {
            fallbackToToday(dateElement);
          }
        })
        .catch(error => {
          console.error('Error fetching GitHub commit date:', error);
          fallbackToToday(dateElement);
        });
    });

    function fallbackToToday(element) {
      const today = new Date();
      const options = { month: 'short', day: 'numeric', year: 'numeric' };
      element.textContent = today.toLocaleDateString('en-US', options);
    }

    // Modal choice logic
    function handleLinkClick(url) {
      const choice = confirm("Open in about:blank? \n\nClick 'OK' for about:blank \nClick 'Cancel' to open normally.");
      if (choice) {
        openBlank(url);
      } else {
        openNormal(url);
      }
    }

    function openNormal(url) {
      window.open(url, '_blank');
    }

    function openBlank(url) {
      const win = window.open('about:blank', '_blank');
      if (win) {
        win.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>about:blank</title>
            <style>
              html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; }
              iframe { border: none; width: 100%; height: 100%; }
            </style>
          </head>
          <body>
            <iframe src="${url}" allowfullscreen></iframe>
          </body>
          </html>
        `);
        win.document.close();
      } else {
        alert("Popup blocked. Allow popups for this page.");
      }
    }
  </script>

</body>
</html>
