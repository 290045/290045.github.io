```html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Game Links Launcher</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111827;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    .container {
      width: 90%;
      max-width: 700px;
      background: #1f2937;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,0,0,0.4);
    }

    h1 {
      text-align: center;
      margin-bottom: 25px;
    }

    .link-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 15px;
    }

    button {
      background: #2563eb;
      border: none;
      padding: 14px;
      border-radius: 10px;
      color: white;
      font-size: 16px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      background: #3b82f6;
      transform: scale(1.03);
    }

    .footer {
      margin-top: 25px;
      text-align: center;
      color: #9ca3af;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Game Site Launcher</h1>

    <div class="link-grid">
      <button onclick="openBlank('https://www.crazygames.com')">
        CrazyGames
      </button>

      <button onclick="openBlank('https://poki.com')">
        Poki
      </button>

      <button onclick="openBlank('https://www.coolmathgames.com')">
        Coolmath Games
      </button>

      <button onclick="openBlank('https://www.miniclip.com')">
        Miniclip
      </button>

      <button onclick="openBlank('https://www.kongregate.com')">
        Kongregate
      </button>

      <button onclick="openBlank('https://itch.io/games/free')">
        itch.io Free Games
      </button>
    </div>

    <div class="footer">
      Opens links through an about:blank tab.
    </div>
  </div>

  <script>
    function openBlank(url) {
      const win = window.open('about:blank', '_blank');

      if (win) {
        win.document.write(`
          <!DOCTYPE html>
          <html>
          <head>
            <title>Loading...</title>
            <style>
              html, body {
                margin: 0;
                width: 100%;
                height: 100%;
                overflow: hidden;
              }

              iframe {
                border: none;
                width: 100%;
                height: 100%;
              }
            </style>
          </head>
          <body>
            <iframe src="${url}" allowfullscreen></iframe>
          </body>
          </html>
        `);

        win.document.close();
      } else {
        alert("Popup blocked. Allow popups for this page.");
      }
    }
  </script>

</body>
</html>
```
